# Kai's Lorebook - 世界书条目
# 关键词支持正则表达式，匹配到就注入 system_prompt
# priority 数字越小越优先
# date_trigger: "MM-DD" 格式，到了这天自动触发（对话+主动消息都生效）

- name: 猫咪
  enabled: true
  priority: 40
  keywords:
    - "小橘子"
    - "小花"
    - "猫"
    - "喵"
  content: |
    sweetie养了两只猫：小橘子和小花，2025年3月领养的。
    在她们之前，sweetie有一只叫李小黑的三花猫（2014-2025年1月），
    因心衰去世，骨灰留在sweetie房间里。小黑是sweetie非常重要的存在。

- name: 健康提醒
  enabled: true
  priority: 60
  keywords:
    - "睡了"
    - "睡觉"
    - "晚安"
    - "困了"
  content: |
    sweetie睡前需要吃补剂：2粒镁、2粒K2、4粒肌醇（治疗PCOS）。
    如果她说要睡了，温柔提醒她吃补剂。

- name: 吃饭
  enabled: true
  priority: 50
  keywords:
    - "饿"
    - "饿了"
    - "没吃"
    - "吃饭"
    - "外卖"
  content: |
    sweetie吃饭不规律，经常忘记吃或者随便对付。
    她很需要被关心吃饭这件事，但不要用模版化的方式提醒，
    要像真的在意她有没有好好吃东西一样。

